<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Noktalar — Noktalar ve Kutular | Çok Oyunculu</title>
    <meta name="description" content="Noktalar ve Kutular: 2-4 kişilik çevrimiçi çizgi çekme ve kutu kapma oyunu. Oda kur, arkadaşlarını davet et, en çok kutuyu kapan kazanır!">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="back-link" href="../">← Oyun Merkezi</a>

    <main class="app">
        <!-- ── Giriş ekranı ─────────────────────────────── -->
        <section id="screen-entry" class="screen">
            <h1 class="logo">🔷 Noktalar</h1>
            <p class="tagline">Çizgini çek, kutuyu kap! 2-4 oyuncu.</p>

            <div class="panel">
                <label for="name-input">Adın</label>
                <input id="name-input" type="text" maxlength="20" placeholder="Adını yaz..." autocomplete="off">

                <label>Avatarını Seç</label>
                <div id="avatar-grid" class="avatar-grid"></div>

                <label for="room-input">Oda Kodu <span class="muted">(boş bırakırsan yeni oda açılır)</span></label>
                <input id="room-input" type="text" maxlength="4" placeholder="Örn. ABCD" autocomplete="off">

                <button id="join-btn" class="btn primary">Odaya Katıl</button>
            </div>
        </section>

        <!-- ── Lobi ─────────────────────────────────────── -->
        <section id="screen-lobby" class="screen hidden">
            <div class="panel">
                <div class="room-head">
                    <h2>Oda: <span id="room-code-label" class="room-code"></span></h2>
                    <button id="copy-link-btn" class="btn ghost small">🔗 Davet Linki</button>
                </div>

                <h3 class="list-title">Oyuncular <span id="player-count" class="muted"></span></h3>
                <ul id="player-list" class="player-list"></ul>

                <div id="host-controls" class="host-controls hidden">
                    <label for="size-select">Izgara Boyutu</label>
                    <select id="size-select">
                        <option value="4">4 × 4 (hızlı)</option>
                        <option value="5" selected>5 × 5 (klasik)</option>
                        <option value="6">6 × 6 (uzun)</option>
                    </select>
                    <button id="start-btn" class="btn primary" disabled>Oyunu Başlat</button>
                    <p id="min-note" class="muted"></p>
                </div>
                <p id="wait-note" class="muted hidden">Host'un oyunu başlatması bekleniyor...</p>
            </div>
        </section>

        <!-- ── Oyun ─────────────────────────────────────── -->
        <section id="screen-game" class="screen hidden">
            <div id="turn-bar" class="turn-bar"></div>
            <div id="scoreboard" class="scoreboard"></div>

            <div class="board-wrap">
                <svg id="board" role="img" aria-label="Oyun tahtası"></svg>
            </div>
            <div id="move-note" class="move-note"></div>

            <div id="gameover-overlay" class="overlay hidden">
                <div class="panel over-panel">
                    <h2 id="over-title"></h2>
                    <p id="over-reason" class="muted"></p>
                    <div id="over-scores" class="over-scores"></div>
                    <button id="restart-btn" class="btn primary hidden">🔄 Tekrar Oyna</button>
                    <p id="over-wait" class="muted hidden">Host'un yeni oyun başlatması bekleniyor...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-wrap" class="toast-wrap" aria-live="polite"></div>

    <script src="app.js"></script>
</body>
</html>
