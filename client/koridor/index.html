<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koridor — Çok Oyunculu Strateji Oyunu</title>
    <meta name="description" content="Koridor (Quoridor): piyonunu karşıya ulaştır, duvarlarla rakibinin yolunu kes. Arkadaşınla çevrimiçi oyna!">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="hub-link" href="../">← Oyun Merkezi</a>

    <!-- ── Lobi ekranı ─────────────────────────────── -->
    <main id="screen-lobby" class="screen">
        <header class="lobby-head">
            <h1>Koridor</h1>
            <p class="tagline">Piyonunu karşıya ulaştır, duvarlarla rakibin yolunu kes.</p>
        </header>

        <!-- Katılım formu -->
        <section id="join-panel" class="panel">
            <label for="name-input">Adın</label>
            <input id="name-input" type="text" maxlength="20" placeholder="Adını yaz..." autocomplete="off">

            <label>Avatar Seç</label>
            <div id="avatar-grid" class="avatar-grid"></div>

            <label for="room-input">Oda Kodu <span class="muted">(boş bırak → yeni oda)</span></label>
            <input id="room-input" type="text" maxlength="4" placeholder="ör. ABCD" autocomplete="off">

            <button id="join-btn" class="btn primary">Odaya Katıl</button>
            <p id="conn-status" class="muted small"></p>
        </section>

        <!-- Oda / bekleme -->
        <section id="room-panel" class="panel hidden">
            <div class="room-code-row">
                <div>
                    <span class="muted small">Oda Kodu</span>
                    <div id="room-code" class="room-code">----</div>
                </div>
                <button id="copy-link-btn" class="btn ghost">Davet Linkini Kopyala</button>
            </div>

            <h2 class="section-title">Oyuncular</h2>
            <ul id="player-list" class="player-list"></ul>

            <button id="start-btn" class="btn primary hidden" disabled>Oyunu Başlat</button>
            <p id="wait-note" class="muted small hidden">Host bekleniyor…</p>
        </section>
    </main>

    <!-- ── Oyun ekranı ─────────────────────────────── -->
    <main id="screen-game" class="screen hidden">
        <div class="hud">
            <div id="card-me" class="player-card me">
                <span class="pc-avatar"></span>
                <span class="pc-name"></span>
                <span class="pc-walls" title="Kalan duvar"></span>
            </div>
            <div id="turn-badge" class="turn-badge"></div>
            <div id="card-opp" class="player-card opp">
                <span class="pc-avatar"></span>
                <span class="pc-name"></span>
                <span class="pc-walls" title="Kalan duvar"></span>
            </div>
        </div>

        <p id="goal-hint" class="goal-hint"></p>

        <div class="board-wrap">
            <div id="board" class="board" aria-label="Koridor tahtası"></div>
        </div>

        <div class="controls">
            <button id="wall-mode-btn" class="btn ghost">🧱 Duvar Koy</button>
            <p id="mode-hint" class="muted small">Piyonuna dokun → yeşil hücreye git.</p>
        </div>
    </main>

    <!-- ── Oyun sonu ───────────────────────────────── -->
    <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
            <div id="over-emoji" class="over-emoji">🏆</div>
            <h2 id="over-title">Oyun Bitti</h2>
            <p id="over-reason" class="muted"></p>
            <button id="restart-btn" class="btn primary hidden">Tekrar Oyna</button>
            <p id="over-wait" class="muted small hidden">Host'un yeni oyun başlatması bekleniyor…</p>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
